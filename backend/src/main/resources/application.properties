spring.application.name=chat-app

# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/chat_app_db
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=your-secret-key-change-this-in-production-environment-for-security
jwt.expiration=86400000

# File Upload Configuration
file.upload.max-size=104857600
file.upload.path=/uploads/media

# Logging
logging.level.root=INFO
logging.level.com.videoapp=DEBUG

# CORS Configuration
cors.allowedOrigins=http://localhost:3000,http://localhost:5173
cors.allowedMethods=GET,POST,PUT,DELETE,OPTIONS
cors.allowedHeaders=*
cors.allowCredentials=true
